name: Sandbox Deployment (JWT + Delta)

on:
  push:
    branches:
      - sandbox
  pull_request:
    types: [closed]
    branches:
      - sandbox

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout full history (needed for delta)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🟢 Install Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # 🔐 Create JWT key file 
      - name: Create JWT key file 
        run: | 
          echo "${{ secrets.SF_JWT_KEY }}" > SALESFORCE_360_ORG_KEY 
          chmod 600 SALESFORCE_360_ORG_KEY

      # 🔑 Pre-check JWT Authentication
      - name: Verify JWT Auth
        run: |
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID }} \
            --jwt-key-file SALESFORCE_360_ORG_KEY \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url https://test.salesforce.com \
            --alias sandbox
          sf org display --target-org sandbox

      # 📦 Install SFDX Git Delta plugin
      - name: Install SFDX Git Delta
        run: echo y | sf plugins install sfdx-git-delta

      # 🔍 Determine commit range
      - name: Set commit range
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
            echo "HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "BASE=$(git rev-parse HEAD~1)" >> $GITHUB_ENV
            echo "HEAD=$(git rev-parse HEAD)" >> $GITHUB_ENV
          fi

      # 🚀 Generate delta (package.xml + destructiveChanges.xml)
      - name: Generate Delta
        run: |
          mkdir -p delta
          sf sgd:source:delta \
            --to $HEAD \
            --from $BASE \
            --output-dir delta \
            --generate-delta \
            --source-dir force-app

      # 📂 Debug output (optional but useful)
      - name: Show generated files
        run: |
          echo "==== package.xml ===="
          if [ -f delta/package/package.xml ]; then cat delta/package/package.xml; else echo "No package.xml"; fi
          
          echo "==== destructiveChanges.xml ===="
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then cat delta/destructiveChanges/destructiveChanges.xml; else echo "No destructiveChanges"; fi

      # 🚫 Skip if nothing to deploy
      - name: Check if deployment needed
        id: check
        run: |
          if [ ! -f "delta/package/package.xml" ] && [ ! -f "delta/destructiveChanges/destructiveChanges.xml" ]; then
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      # 🚀 Deploy package + destructive changes (atomic)
      - name: Deploy Delta to Sandbox
        if: env.skip == 'false'
        run: |
          DEPLOY_CMD="sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org sandbox \
            --wait 20 \
            --test-level RunLocalTests \
            --ignore-warnings"

          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi

          echo "Running deploy: $DEPLOY_CMD"
          eval $DEPLOY_CMD